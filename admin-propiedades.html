<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | BROS Propiedades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="text-gray-800">

    <header class="bg-[#0E0D0D] text-white p-6 shadow-md">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-3"><i class="fa-solid fa-lock text-[#D0AA70]"></i> BROS Admin</h1>
            <span class="bg-[#D0AA70] text-[#0E0D0D] px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Generador HD</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-6 mt-6">
        
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <h2 class="text-xl font-bold mb-6 border-b pb-4">Cargar Nueva Propiedad</h2>
            
            <form id="propiedadForm" class="space-y-6">
                <!-- SECCIÓN 1: Datos Básicos -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Título de la Propiedad</label>
                        <input type="text" id="p_nombre" required placeholder="Ej: Espectacular Casa en Vitacura" class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#D0AA70]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Comuna / Ciudad</label>
                        <input type="text" id="p_ciudad" required placeholder="Ej: Las Condes" class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#D0AA70]">
                    </div>
                </div>

                <!-- SECCIÓN 2: Clasificación y Precio -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Operación</label>
                        <select id="p_operacion" class="w-full border p-3 rounded-lg focus:outline-none">
                            <option value="Venta">Venta</option>
                            <option value="Arriendo">Arriendo</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Tipo</label>
                        <select id="p_tipo" class="w-full border p-3 rounded-lg focus:outline-none">
                            <option value="Casa">Casa</option>
                            <option value="Departamento">Departamento</option>
                            <option value="Terreno">Terreno</option>
                            <option value="Oficina">Oficina</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Estado Público</label>
                        <select id="p_estado" class="w-full border p-3 rounded-lg focus:outline-none bg-gray-50 font-semibold">
                            <option value="disponible">🟢 Disponible</option>
                            <option value="en_proceso">🟡 En Proceso</option>
                            <option value="vendida">🔴 Vendida</option>
                            <option value="rentada">🔴 Arrendada</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Precio y Moneda</label>
                        <div class="flex">
                            <select id="p_moneda" class="border-y border-l p-3 rounded-l-lg focus:outline-none bg-gray-100 font-bold">
                                <option value="UF">UF</option>
                                <option value="CLP">CLP</option>
                            </select>
                            <input type="number" id="p_precio" required placeholder="Ej: 12000" class="w-full border p-3 rounded-r-lg focus:outline-none">
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 3: Características -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <div><label class="block text-xs font-bold text-gray-500 uppercase mb-2">Dormitorios</label><input type="number" id="p_recamaras" value="0" min="0" class="w-full border p-3 rounded-lg"></div>
                    <div><label class="block text-xs font-bold text-gray-500 uppercase mb-2">Baños</label><input type="number" id="p_banos" value="0" min="0" class="w-full border p-3 rounded-lg"></div>
                    <div><label class="block text-xs font-bold text-gray-500 uppercase mb-2">Estacionam.</label><input type="number" id="p_estacionamientos" value="0" min="0" class="w-full border p-3 rounded-lg"></div>
                    <div><label class="block text-xs font-bold text-gray-500 uppercase mb-2">M² Totales</label><input type="number" id="p_m2" value="0" min="0" class="w-full border p-3 rounded-lg"></div>
                </div>

                <!-- SECCIÓN 4: Contenido Multimedia -->
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-blue-600 uppercase mb-2"><i class="fa-brands fa-youtube"></i> Link de Video YouTube (Opcional)</label>
                        <input type="url" id="p_video" placeholder="Ej: https://www.youtube.com/watch?v=..." class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 bg-blue-50/30">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Descripción Detallada</label>
                        <textarea id="p_descripcion" rows="4" class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#D0AA70]"></textarea>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Fotografías Alta Calidad (Máx 15)</label>
                        <input type="file" id="p_fotos" multiple accept="image/*" class="w-full border p-3 rounded-lg bg-white font-medium">
                        <p class="text-xs text-gray-400 mt-1">El sistema ahora conserva la calidad Full HD (1920px) al 90% de detalle.</p>
                    </div>
                </div>

                <div class="pt-6 border-t flex justify-end gap-4">
                    <button type="button" onclick="limpiarFormulario()" class="px-6 py-3 rounded-lg font-bold text-gray-500 hover:bg-gray-100">Limpiar</button>
                    <button type="submit" class="bg-[#0E0D0D] text-white px-8 py-3 rounded-lg font-bold hover:bg-[#D0AA70] hover:text-[#0E0D0D] transition-colors shadow-lg">Guardar Propiedad</button>
                </div>
            </form>
        </div>

        <!-- LISTA -->
        <div class="bg-white rounded-2xl shadow-lg p-8 mt-8">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-xl font-bold">Propiedades en el Sistema</h2>
                <button onclick="exportarJS()" class="bg-[#D0AA70] text-[#0E0D0D] px-6 py-2 rounded-lg font-bold shadow-md hover:bg-[#956932] hover:text-white transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-download"></i> Exportar "propiedades.js"
                </button>
            </div>
            <div id="listaPropiedades" class="space-y-4">
                <p class="text-gray-400 text-center py-4">No hay propiedades guardadas aún.</p>
            </div>
        </div>
    </main>

    <script>
        let inventario = [];

        // 🚀 NUEVA FUNCIÓN DE COMPRESIÓN: ALTA CALIDAD FULL HD
        function procesarImagen(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        // Ampliamos el ancho a 1920 para que no pierda resolución
                        const MAX_WIDTH = 1920; 
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        // Subimos la calidad JPEG a 0.90 (90%) para nitidez extrema
                        resolve(canvas.toDataURL('image/jpeg', 0.90)); 
                    };
                };
            });
        }

        document.getElementById('propiedadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btnSubmit = e.target.querySelector('button[type="submit"]');
            const originalText = btnSubmit.innerText;
            btnSubmit.innerText = "Procesando fotos en Alta Calidad...";
            btnSubmit.disabled = true;

            const fotosInput = document.getElementById('p_fotos').files;
            let fotosBase64 = [];
            
            for (let i = 0; i < Math.min(fotosInput.length, 15); i++) {
                let imgComprimida = await procesarImagen(fotosInput[i]);
                fotosBase64.push(imgComprimida);
            }

            const nuevaPropiedad = {
                id: 'bros_' + Date.now().toString(36),
                nombre: document.getElementById('p_nombre').value,
                ciudad: document.getElementById('p_ciudad').value,
                operacion: document.getElementById('p_operacion').value,
                tipo: document.getElementById('p_tipo').value,
                estado: document.getElementById('p_estado').value,
                moneda: document.getElementById('p_moneda').value,
                precio: document.getElementById('p_precio').value,
                recamaras: document.getElementById('p_recamaras').value,
                banos: document.getElementById('p_banos').value,
                estacionamientos: document.getElementById('p_estacionamientos').value,
                m2total: document.getElementById('p_m2').value,
                video: document.getElementById('p_video').value,
                descripcion: document.getElementById('p_descripcion').value,
                fotos: fotosBase64
            };

            inventario.unshift(nuevaPropiedad);
            actualizarLista();
            limpiarFormulario();
            
            btnSubmit.innerText = originalText;
            btnSubmit.disabled = false;
        });

        function eliminarPropiedad(id) {
            if(confirm('¿Estás seguro de eliminar esta propiedad?')) {
                inventario = inventario.filter(p => p.id !== id);
                actualizarLista();
            }
        }

        function actualizarLista() {
            const container = document.getElementById('listaPropiedades');
            container.innerHTML = '';
            if(inventario.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-4">No hay propiedades guardadas aún.</p>';
                return;
            }
            inventario.forEach(p => {
                const img = (p.fotos && p.fotos.length > 0) ? p.fotos[0] : 'https://via.placeholder.com/150?text=Sin+Foto';
                container.innerHTML += `
                    <div class="flex items-center justify-between bg-white border p-4 rounded-xl shadow-sm">
                        <div class="flex items-center gap-4">
                            <img src="${img}" class="w-16 h-16 object-cover rounded-lg">
                            <div>
                                <h4 class="font-bold text-gray-900">${p.nombre}</h4>
                                <p class="text-xs text-gray-500">${p.operacion} | ${p.moneda} ${p.precio} | ${p.estado}</p>
                            </div>
                        </div>
                        <button onclick="eliminarPropiedad('${p.id}')" class="text-red-500 hover:text-red-700 bg-red-50 p-3 rounded-lg"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            });
        }

        function limpiarFormulario() { document.getElementById('propiedadForm').reset(); }

        function exportarJS() {
            if(inventario.length === 0) { alert("Debes cargar al menos una propiedad."); return; }
            const jsContent = "const PROPIEDADES = " + JSON.stringify(inventario, null, 4) + ";";
            const blob = new Blob([jsContent], { type: "text/javascript" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "propiedades.js";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
