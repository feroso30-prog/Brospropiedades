    <!-- ================= MODALES ================= -->

    <script>
        // Efecto Header y Scroll
        window.addEventListener('scroll', () => { document.getElementById('main-header').classList.toggle('header-scrolled', window.scrollY > 50); });
        const observer = new IntersectionObserver(e => e.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); }));
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // 🔵 OBTENER UF EN TIEMPO REAL
        let valorUFActual = 39000; 
        async function cargarValorUF() {
            try {
                document.getElementById('ufLoadingIcon').classList.remove('opacity-0');
                const respuesta = await fetch('https://mindicador.cl/api/uf');
                const datos = await respuesta.json();
                if(datos && datos.serie && datos.serie.length > 0) {
                    valorUFActual = datos.serie[0].valor;
                    document.getElementById('sPrecio').title = `1 UF = $${Math.round(valorUFActual).toLocaleString('es-CL')} CLP`;
                }
            } catch (error) { console.warn("UF de respaldo activa."); } 
            finally { document.getElementById('ufLoadingIcon').classList.add('opacity-0'); }
        }

        // 🟢 NUEVO CEREBRO: CONEXIÓN API KITEPROP
        window.PROPIEDADES = []; // Variable global donde guardaremos los datos limpios
        let filtroActual = "Todos";

        async function sincronizarKiteprop() {
            const API_KEY = "kp_RWPQdkrrMLApXNdCHYU49Igi1IvwsW9HZNk0wZFM";
            const URL_KITEPROP = "https://www.kiteprop.com/api/v1/properties";

            try {
                const response = await fetch(URL_KITEPROP, {
                    method: 'GET',
                    headers: {
                        'X-API-Key': API_KEY,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error("Error de conexión con Kiteprop");

                const json = await response.json();
                
                if(json && json.data) {
                    // TRADUCTOR: Kiteprop -> Tu sitio web
                    window.PROPIEDADES = json.data.map(kp => {
                        
                        // Extraer imágenes
                        let fotosArr = [];
                        if(kp.images_list && kp.images_list.length > 0) {
                            fotosArr = kp.images_list.map(img => img.lg || img.md || img.sm || 'bros-logo.png');
                        }

                        // Mapeo de Tipo de Inmueble
                        let tipoProp = "Propiedad";
                        if(kp.type === "houses") tipoProp = "Casa";
                        else if(kp.type === "apartments") tipoProp = "Departamento";
                        else if(kp.type === "residential_lands" || kp.type === "industrial_lands") tipoProp = "Terreno";
                        else if(kp.type === "offices") tipoProp = "Oficina";

                        // Mapeo de Estados
                        let estadoProp = "disponible";
                        if(kp.status === "sold") estadoProp = "vendida";
                        else if(kp.status === "rented") estadoProp = "rentada";
                        else if(kp.status === "reserved") estadoProp = "en_proceso";

                        // Buscar el precio (Extracción robusta adaptada a Kiteprop)
                        let opFinal = "Venta";
                        let monFinal = "UF";
                        let preFinal = 0;
                        
                        if (kp.operations && kp.operations.length > 0) {
                            const operacion = kp.operations[0];
                            opFinal = (operacion.operation_type === 'rental' || operacion.operation_type === 'temporary_rental') ? "Arriendo" : "Venta";
                            
                            if (operacion.prices && operacion.prices.length > 0) {
                                preFinal = operacion.prices[0].amount || operacion.prices[0].value || 0;
                                let currId = operacion.prices[0].currency_id || (operacion.prices[0].currency ? operacion.prices[0].currency.id : null);
                                if (currId == 6 || operacion.prices[0].currency_name === 'CLP') monFinal = "CLP";
                                else if (currId == 19 || operacion.prices[0].currency_name === 'UF') monFinal = "UF";
                            }
                        }

                        return {
                            id: String(kp.id),
                            nombre: kp.title || "Propiedad sin título",
                            ciudad: kp.city || kp.neighborhood || "Ubicación no especificada",
                            operacion: opFinal,
                            tipo: tipoProp,
                            estado: estadoProp,
                            moneda: monFinal,
                            precio: preFinal,
                            recamaras: kp.bedrooms || 0,
                            banos: kp.bathrooms || 0,
                            estacionamientos: kp.parkings || 0,
                            m2total: kp.total_meters || 0,
                            video: kp.link_youtube || "",
                            descripcion: kp.description || "",
                            fotos: fotosArr
                        };
                    });

                    // Renderizamos las propiedades ya traducidas
                    renderProperties(window.PROPIEDADES);
                }
            } catch (error) {
                console.error("Error sincronizando:", error);
                document.getElementById('propertiesGrid').innerHTML = '<p class="text-red-500 col-span-3 text-center py-10 font-bold">Error al sincronizar con Kiteprop. Verifica tu conexión o políticas de seguridad (CORS).</p>';
            }
        }

        // RENDER DE TARJETAS (Idéntico a antes)
        function renderProperties(list) {
            const grid = document.getElementById('propertiesGrid');
            grid.innerHTML = '';
            
            if (!list || list.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 col-span-3 text-center py-10 font-medium">No hay propiedades que coincidan con tu búsqueda.</p>';
                document.getElementById('propiedades-contador').innerText = `Explora nuestro catálogo seleccionado.`;
                return;
            }
            
            document.getElementById('propiedades-contador').innerText = `Mostrando ${list.length} propiedades exclusivas sincronizadas en tiempo real.`;

            list.forEach((prop, i) => {
                const fotoP = (prop.fotos && prop.fotos.length > 0) ? prop.fotos[0] : 'bros-logo.png';
                const precioFmt = prop.precio ? Number(prop.precio).toLocaleString('es-CL') : '0';
                
                let estadoColor = 'text-gray-400'; let estadoTexto = 'Inactiva';
                if(prop.estado === 'disponible') { estadoColor = 'text-green-500'; estadoTexto = 'Disponible'; }
                else if(prop.estado === 'vendida') { estadoColor = 'text-red-500'; estadoTexto = 'Vendida'; }
                else if(prop.estado === 'rentada') { estadoColor = 'text-red-500'; estadoTexto = 'Arrendada'; }
                else if(prop.estado === 'en_proceso') { estadoColor = 'text-yellow-600'; estadoTexto = 'En proceso'; }
                
                grid.innerHTML += `
                    <div class="property-card bg-white border border-gray-100 reveal active" style="transition-delay: ${(i%3)*100}ms">
                        <div class="h-64 relative bg-gray-100 overflow-hidden">
                            <div class="badge bg-[#0E0D0D] text-[#D0AA70]">${prop.operacion}</div>
                            <img src="${fotoP}" alt="${prop.nombre}" class="w-full h-full object-cover">
                            <div class="overlay-action">
                                <a href="https://wa.me/56952046918?text=Hola,%20me%20interesa%20la%20propiedad%20${encodeURIComponent(prop.nombre)}" target="_blank" class="w-full bg-[#D0AA70] text-[#0E0D0D] text-center py-3.5 rounded-xl font-bold hover:bg-white transition-all">
                                    <i class="fa-regular fa-calendar-check"></i> Agendar Visita
                                </a>
                            </div>
                        </div>
                        <div class="p-7">
                            <h3 class="font-bold text-xl text-gray-900 line-clamp-1 mb-1">${prop.nombre}</h3>
                            <div class="flex justify-between items-center mt-2">
                                <p class="text-gray-500 text-sm font-medium line-clamp-1"><i class="fa-solid fa-location-dot mr-1.5 text-gray-300"></i>${prop.ciudad}</p>
                                <a href="propiedad.html?id=${prop.id}" class="text-xs font-semibold text-gray-400 hover:text-[#D0AA70] transition-colors uppercase tracking-widest flex items-center gap-1 cursor-pointer shrink-0 ml-2">
                                    Descripción <i class="fa-solid fa-arrow-right"></i>
                                </a>
                            </div>
                            
                            <div class="flex justify-between items-end pt-5 mt-5 border-t border-gray-100">
                                <div class="flex flex-col min-w-[100px]">
                                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-0.5">Valor ${prop.moneda}</span>
                                    <span class="text-[#D0AA70] font-extrabold text-2xl leading-none">${precioFmt}</span>
                                    <span class="text-xs font-bold mt-2 uppercase tracking-wider ${estadoColor}">${estadoTexto}</span>
                                </div>
                                <div class="text-gray-400 text-[11px] font-medium flex items-center justify-end gap-2.5 whitespace-nowrap">
                                    <span title="Dormitorios"><i class="fa-solid fa-bed"></i> ${prop.recamaras}</span>
                                    <span title="Baños"><i class="fa-solid fa-bath"></i> ${prop.banos}</span>
                                    <span title="Estacionamientos"><i class="fa-solid fa-car"></i> ${prop.estacionamientos}</span>
                                    <span title="M2 Totales" class="flex items-center gap-1"><i class="fa-solid fa-vector-square"></i> ${prop.m2total} m²</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        // BUSCADOR AVANZADO MEJORADO
        function buscarPropiedadesAvanzado() {
            if(!window.PROPIEDADES || window.PROPIEDADES.length === 0) return;
            
            const sOperacion = document.getElementById('sOperacion').value; 
            const sUbi = document.getElementById('sUbi').value.toLowerCase();
            const sHab = parseInt(document.getElementById('sHab').value) || 0;
            const sBanos = parseInt(document.getElementById('sBanos').value) || 0;
            const sM2 = parseInt(document.getElementById('sM2').value) || 0;
            const sPrecio = parseInt(document.getElementById('sPrecio').value) || Infinity;
            const sMoneda = document.getElementById('sMoneda').value; 

            const filtradas = window.PROPIEDADES.filter(p => {
                const matchOperacion = (sOperacion === "Todos" || p.operacion === sOperacion || (sOperacion === "Renta" && p.operacion === "Arriendo"));
                const textUbi = (p.ciudad || "").toLowerCase();
                const matchUbi = !sUbi || textUbi.includes(sUbi);
                const matchHab = (parseInt(p.recamaras) || 0) >= sHab;
                const matchBanos = (parseInt(p.banos) || 0) >= sBanos;
                const matchM2 = (parseInt(p.m2total) || 0) >= sM2;
                
                let precioProp = parseFloat(p.precio) || 0;
                if (sMoneda === "CLP") {
                    if (p.moneda !== "CLP" && p.moneda !== "MXN") precioProp = precioProp * valorUFActual; 
                } else {
                    if (p.moneda === "CLP" || p.moneda === "MXN") precioProp = precioProp / valorUFActual; 
                }
                
                const matchPrecio = precioProp <= sPrecio;
                const matchCat = (filtroActual === "Todos" || p.tipo === filtroActual);

                return matchOperacion && matchUbi && matchHab && matchBanos && matchM2 && matchPrecio && matchCat;
            });
            
            renderProperties(filtradas);
            document.getElementById('propiedades').scrollIntoView({ behavior: 'smooth' });
        }

        function filtrarCategoria(cat) {
            filtroActual = cat; 
            document.querySelectorAll('.cat-btn').forEach(btn => { btn.classList.remove('bg-[#0E0D0D]', 'text-[#EFEFEF]'); btn.classList.add('bg-white', 'text-gray-600'); });
            event.target.classList.remove('bg-white', 'text-gray-600'); event.target.classList.add('bg-[#0E0D0D]', 'text-[#EFEFEF]');
            buscarPropiedadesAvanzado();
        }

        // CARGA INICIAL
        window.onload = () => { 
            cargarValorUF();
            sincronizarKiteprop();
        };
    </script>
</body>
