        .property-card:hover .overlay-action { bottom: 0; }
        .badge { position: absolute; top: 1rem; left: 1rem; z-index: 10; padding: 0.35rem 0.85rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); backdrop-filter: blur(4px); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #D0AA70; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

<body class="text-gray-900 antialiased selection:bg-[#D0AA70] selection:text-[#0E0D0D]">

    <header id="main-header" class="w-full bg-[#0E0D0D] fixed top-0 z-50 h-28 flex items-center shadow-lg">
        <div class="max-w-7xl mx-auto px-6 w-full flex items-center justify-between">

                <div id="header-logo-container" class="flex items-center justify-center w-28 h-28 overflow-hidden rounded-xl">

            <nav class="hidden lg:flex items-center space-x-8 text-sm font-medium text-[#EFEFEF]">

                <a href="https://wa.me/56952046918?text=Hola,%20quiero%20dejar%20mi%20propiedad%20con%20ustedes" target="_blank" class="text-[#D0AA70] hover:text-white transition-colors">Deja tu propiedad aquí</a>
            </nav>
            <div class="relative group hidden lg:block">
                <a href="https://wa.me/56952046918?text=Hola,%20quisiera%20solicitar%20una%20tasación%20gratuita" target="_blank" class="bg-[#D0AA70] hover:bg-[#956932] text-[#0E0D0D] hover:text-white px-7 py-3.5 rounded-full text-sm font-bold transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(208,170,112,0.3)] block">
                    Solicita tu tasación gratis

    <section class="relative pt-40 pb-36 px-6 overflow-hidden z-0">
        <div class="hero-bg"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-[#0E0D0D]/70 via-[#0E0D0D]/40 to-[#0E0D0D] z-0"></div>
        <div class="max-w-6xl mx-auto text-center relative z-10 reveal">
            <span class="inline-flex items-center gap-2 bg-white/10 text-[#D0AA70] px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest mb-8 border border-white/20 backdrop-blur-md shadow-lg">✨ El Top 1% del Mercado Inmobiliario</span>
            <h1 class="text-5xl md:text-6xl lg:text-7xl font-extrabold text-[#EFEFEF] tracking-tight leading-[1.1] mb-8 drop-shadow-xl">La alegría y emoción de<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-[#D0AA70] to-[#E5C992]">ver el hogar de tus sueños</span></h1>
            
            <div class="w-full bg-white/20 backdrop-blur-xl rounded-[2rem] shadow-2xl border border-white/30 p-4 mt-12 transition-all">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-8 gap-3">
                    <div class="relative lg:col-span-2">
                        <select id="sOperacion" class="w-full bg-white py-3.5 pl-4 pr-8 rounded-xl outline-none text-gray-900 font-medium shadow-inner">
                            <option value="Todos">Operación</option><option value="Venta">Venta</option><option value="Arriendo">Arriendo</option>
                        </select>
                    </div>
                    <div class="relative lg:col-span-2">
                        <input type="text" id="sUbi" placeholder="Ubicación o Ciudad..." class="w-full bg-white py-3.5 pl-4 pr-8 rounded-xl outline-none text-gray-900 font-medium shadow-inner">
                    </div>
                    <div class="relative">
                        <input type="number" id="sHab" placeholder="Dorm." min="0" class="w-full bg-white py-3.5 pl-4 pr-4 rounded-xl outline-none text-gray-900 font-medium shadow-inner">
                    </div>
                    <div class="relative">
                        <input type="number" id="sBanos" placeholder="Baños" min="0" class="w-full bg-white py-3.5 pl-4 pr-4 rounded-xl outline-none text-gray-900 font-medium shadow-inner">
                    </div>
                    <button onclick="buscarPropiedadesAvanzado()" class="lg:col-span-2 w-full bg-[#D0AA70] hover:bg-[#956932] text-[#0E0D0D] hover:text-white py-3.5 px-4 rounded-xl font-bold transition-all shadow-md flex items-center justify-center gap-2">
                        <i class="fa-solid fa-magnifying-glass"></i> Buscar
                    </button>
                </div>
            </div>
        </div>
    </section>

    <section id="propiedades" class="max-w-7xl mx-auto px-6 py-24">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-16 reveal">
            <div>
                <h2 class="text-4xl font-bold tracking-tight text-[#0E0D0D] mb-3">Colección Exclusiva</h2>
                <p class="text-gray-500 font-light text-lg" id="propiedades-contador">Conectando con túnel seguro de Netlify...</p>
            </div>
            <div class="mt-6 md:mt-0 flex flex-wrap gap-3">
                <button onclick="filtrarCategoria('Todos')" class="cat-btn px-6 py-2.5 rounded-full text-sm font-semibold bg-[#0E0D0D] text-[#EFEFEF]">Todos</button>
                <button onclick="filtrarCategoria('Casa')" class="cat-btn px-6 py-2.5 rounded-full text-sm font-semibold bg-white border border-gray-200 text-gray-600">Casas</button>
                <button onclick="filtrarCategoria('Departamento')" class="cat-btn px-6 py-2.5 rounded-full text-sm font-semibold bg-white border border-gray-200 text-gray-600">Departamentos</button>
            </div>
        </div>
        
        <div id="propertiesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="col-span-3 py-20 text-center"><div class="loader"></div><p class="text-gray-400 mt-4 font-semibold">Sincronizando con Kiteprop...</p></div>
        </div>
    </section>

    <script>
        // OBTENER UF EN TIEMPO REAL
        let valorUFActual = 39000; 
        async function cargarValorUF() {
            try {
                const respuesta = await fetch('https://mindicador.cl/api/uf');
                const datos = await respuesta.json();
                if(datos && datos.serie && datos.serie.length > 0) {
                    valorUFActual = datos.serie[0].valor;
                }
            } catch (error) { console.warn("UF de respaldo activa."); } 
        }

        // CONEXIÓN API KITEPROP CON RUTA ABSOLUTA
        window.PROPIEDADES = []; 
        let filtroActual = "Todos";

        async function sincronizarKiteprop() {
            const API_KEY = "kp_RWPQdkrrMLApXNdCHYU49Igi1IvwsW9HZNk0wZFM";
            const baseUrl = window.location.origin;
            const URL_KITEPROP = `${baseUrl}/api/kiteprop/properties`;

            try {
                // Si detectamos que estás en la vista previa local o en el chat, detenemos la búsqueda
                if (baseUrl.includes('usercontent.goog') || baseUrl.includes('localhost') || baseUrl.includes('127.0.0.1')) {
                    document.getElementById('propertiesGrid').innerHTML = '<div class="col-span-3 text-center py-10 bg-yellow-50 rounded-2xl border border-yellow-200"><p class="text-yellow-700 font-bold text-lg mb-2"><i class="fa-solid fa-triangle-exclamation"></i> Entorno de Vista Previa Detectado</p><p class="text-yellow-600">El túnel seguro de Netlify no funciona en esta vista previa.<br><b>Por favor, sube estos archivos a tu GitHub para verlo funcionar en vivo en brospropiedades.cl</b></p></div>';
                    document.getElementById('propiedades-contador').innerText = "Modo de prueba.";
                    return;
                }

                const response = await fetch(URL_KITEPROP, {
                    method: 'GET',
                    headers: {
                        'X-API-Key': API_KEY,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error("Error de conexión");

                const json = await response.json();
                
                if(json && json.data) {
                    window.PROPIEDADES = json.data.map(kp => {
                        let fotosArr = kp.images_list ? kp.images_list.map(img => img.lg || img.md || 'bros-logo.png') : [];
                        
                        let tipoProp = "Propiedad";
                        if(kp.type === "houses") tipoProp = "Casa";
                        else if(kp.type === "apartments") tipoProp = "Departamento";
                        else if(kp.type === "residential_lands") tipoProp = "Terreno";

                        let opFinal = "Venta"; let monFinal = "UF"; let preFinal = 0;
                        if (kp.operations && kp.operations.length > 0) {
                            const op = kp.operations[0];
                            opFinal = (op.operation_type === 'rental' || op.operation_type === 'temporary_rental') ? "Arriendo" : "Venta";
                            if (op.prices && op.prices.length > 0) {
                                preFinal = op.prices[0].amount || op.prices[0].value || 0;
                                let currId = op.prices[0].currency_id || (op.prices[0].currency ? op.prices[0].currency.id : null);
                                if (currId == 6 || op.prices[0].currency_name === 'CLP') monFinal = "CLP";
                            }
                        }

                        return {
                            id: String(kp.id),
                            nombre: kp.title || "Propiedad",
                            ciudad: kp.city || kp.neighborhood || "Ubicación",
                            operacion: opFinal,
                            tipo: tipoProp,
                            estado: kp.status === "active" ? "disponible" : "vendida",
                            moneda: monFinal,
                            precio: preFinal,
                            recamaras: kp.bedrooms || 0,
                            banos: kp.bathrooms || 0,
                            m2total: kp.total_meters || 0,
                            fotos: fotosArr
                        };
                    });

                    renderProperties(window.PROPIEDADES);
                }
            } catch (error) {
                console.error(error);
                document.getElementById('propertiesGrid').innerHTML = '<p class="text-red-500 col-span-3 text-center py-10 font-bold">Aplicando políticas de seguridad. Recarga la página en 1 minuto para que el túnel CORS se active completamente.</p>';
            }
        }

        function renderProperties(list) {
            const grid = document.getElementById('propertiesGrid');
            grid.innerHTML = '';
            
            if (!list || list.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 col-span-3 text-center py-10 font-medium">No hay propiedades.</p>';
                return;
            }
            
            document.getElementById('propiedades-contador').innerText = `Mostrando ${list.length} propiedades exclusivas.`;

            list.forEach((prop, i) => {
                const fotoP = (prop.fotos && prop.fotos.length > 0) ? prop.fotos[0] : 'bros-logo.png';
                const precioFmt = prop.precio ? Number(prop.precio).toLocaleString('es-CL') : '0';
                
                grid.innerHTML += `
                    <div class="property-card bg-white border border-gray-100 reveal active" style="transition-delay: ${(i%3)*100}ms">
                        <div class="h-64 relative bg-gray-100 overflow-hidden">
                            <div class="badge bg-[#0E0D0D] text-[#D0AA70]">${prop.operacion}</div>
                            <img src="${fotoP}" alt="${prop.nombre}" class="w-full h-full object-cover">
                            <div class="overlay-action">
                                <a href="propiedad.html?id=${prop.id}" class="w-full bg-[#D0AA70] text-[#0E0D0D] text-center py-3.5 rounded-xl font-bold hover:bg-white transition-all">Ver Detalles</a>
                            </div>
                        </div>
                        <div class="p-7">
                            <h3 class="font-bold text-xl text-gray-900 line-clamp-1 mb-1">${prop.nombre}</h3>
                            <p class="text-gray-500 text-sm font-medium"><i class="fa-solid fa-location-dot mr-1.5 text-gray-300"></i>${prop.ciudad}</p>
                            <div class="flex justify-between items-end pt-5 mt-5 border-t border-gray-100">
                                <div>
                                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-0.5">Valor ${prop.moneda}</span>
                                    <span class="text-[#D0AA70] font-extrabold text-2xl">${precioFmt}</span>
                                </div>
                                <div class="text-gray-400 text-[11px] font-medium flex gap-2.5">
                                    <span><i class="fa-solid fa-bed"></i> ${prop.recamaras}</span>
                                    <span><i class="fa-solid fa-bath"></i> ${prop.banos}</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function buscarPropiedadesAvanzado() {
            if(!window.PROPIEDADES) return;
            const sOperacion = document.getElementById('sOperacion').value; 
            const sUbi = document.getElementById('sUbi').value.toLowerCase();
            const sHab = parseInt(document.getElementById('sHab').value) || 0;
            const sBanos = parseInt(document.getElementById('sBanos').value) || 0;

            const filtradas = window.PROPIEDADES.filter(p => {
                const matchOperacion = (sOperacion === "Todos" || p.operacion === sOperacion);
                const matchUbi = !sUbi || (p.ciudad && p.ciudad.toLowerCase().includes(sUbi));
                const matchHab = (parseInt(p.recamaras) || 0) >= sHab;
                const matchBanos = (parseInt(p.banos) || 0) >= sBanos;
                const matchCat = (filtroActual === "Todos" || p.tipo === filtroActual);
                return matchOperacion && matchUbi && matchHab && matchBanos && matchCat;
            });
            renderProperties(filtradas);
        }

        function filtrarCategoria(cat) {
            filtroActual = cat; 
            document.querySelectorAll('.cat-btn').forEach(btn => { btn.classList.remove('bg-[#0E0D0D]', 'text-[#EFEFEF]'); btn.classList.add('bg-white', 'text-gray-600'); });
            event.target.classList.remove('bg-white', 'text-gray-600'); event.target.classList.add('bg-[#0E0D0D]', 'text-[#EFEFEF]');
            buscarPropiedadesAvanzado();
        }

        window.onload = sincronizarKiteprop;
    </script>
</body>
